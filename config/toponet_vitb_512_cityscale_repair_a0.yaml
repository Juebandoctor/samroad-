# SAMRoad++ CityScale config with Local Repair A0 (strict: A* enabled)
# Base: toponet_vitb_512_cityscale.yaml

BASE_LR: 0.001
BATCH_SIZE: 16
DATASET: cityscale
DATA_WORKER_NUM: 1
ENCODER_LORA: false
ENCODER_LR_FACTOR: 0.1
FOCAL_LOSS: false
FREEZE_ENCODER: false
INFER_BATCH_SIZE: 64
INFER_PATCHES_PER_EDGE: 16
ITSC_NMS_RADIUS: 8
ITSC_THRESHOLD: 0.242
MAX_NEIGHBOR_QUERIES: 16
NEIGHBOR_RADIUS: 64
NO_SAM: false
PATCH_SIZE: 512
ROAD_NMS_RADIUS: 16
ROAD_THRESHOLD: 0.404
SAMPLE_MARGIN: 35
SAM_CKPT_PATH: sam_ckpts/sam_vit_b_01ec64.pth
SAM_VERSION: vit_b
TOPONET_VERSION: normal
TOPO_SAMPLE_NUM: 512
TOPO_THRESHOLD: 0.443
TRAIN_EPOCHS: 170
USE_SAM_DECODER: false

# ===== Local Repair A0 =====
ENABLE_LOCAL_REPAIR: true

# Search
REPAIR_SEARCH_RADIUS: 80
REPAIR_MIN_NODE_DISTANCE: 12

# Path Score
REPAIR_MIN_PATH_MEAN_SCORE: 0.35
REPAIR_MIN_PATH_MIN_SCORE: 0.10
REPAIR_MAX_LOW_SCORE_RATIO: 0.30
REPAIR_LOW_SCORE_THRESHOLD: 0.20

# A* Filter
REPAIR_USE_ASTAR: true
REPAIR_BLOCK_THRESHOLD: 200
REPAIR_MAX_PATH_LEN: 100

# Direction Cone
REPAIR_CONE_ANGLE: 100
REPAIR_MIN_DIRECTION_EDGE_LEN: 20

# Global Protection
REPAIR_MAX_EDGES_PER_ENDPOINT: 1
REPAIR_MAX_ADDED_EDGES_PER_IMAGE: 30
REPAIR_MAX_ADDED_EDGE_RATIO: 0.10
REPAIR_SKIP_SAME_COMPONENT: true
