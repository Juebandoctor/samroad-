DATASET: 'cityscale'

# IN1k + MAE only
NO_SAM: False

SAM_VERSION: 'vit_b'
SAM_CKPT_PATH: 'sam_ckpts/sam_vit_b_01ec64.pth'
PATCH_SIZE: 512
BATCH_SIZE: 16
DATA_WORKER_NUM: 1
TRAIN_EPOCHS: 10
BASE_LR: 0.001
FREEZE_ENCODER: False
ENCODER_LR_FACTOR: 0.1
ENCODER_LORA: False
FOCAL_LOSS: False
USE_SAM_DECODER: False

# TOPONET
TOPO_SAMPLE_NUM: 512
TOPONET_VERSION: 'normal'
ENABLE_POINT_JITTER: True
POINT_JITTER_STD: 1.0
ENABLE_POINT_DROP: True
POINT_DROP_PROB: 0.05
ENABLE_POINT_FP: True
POINT_FP_NUM: 8
POINT_FP_MIN_DIST: 16.0
ENABLE_ORIENTATION_HEAD: True
ENABLE_ORIENTATION_FUSION: False
ORIENTATION_DIM: 2
TOPO_ORIENTATION_ALPHA: 0.85

# Inference
INFER_BATCH_SIZE: 64
SAMPLE_MARGIN: 64
INFER_PATCHES_PER_EDGE: 16
ENABLE_BORDER_WEIGHT_FUSION: True
BORDER_WEIGHT_EPS: 1.0
EDGE_WEIGHT_MODE: 'min_margin'

ITSC_THRESHOLD: 0.248
ROAD_THRESHOLD: 0.364
TOPO_THRESHOLD: 0.500
# pixels
ITSC_NMS_RADIUS: 8
ROAD_NMS_RADIUS: 16
NEIGHBOR_RADIUS: 64
MAX_NEIGHBOR_QUERIES: 16
